name: valampure_app
description: "valampure ERP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  image_picker: ^1.2.1
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.1
  fl_chart: ^0.70.0
  provider: ^6.1.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ASSETS SECTION
  # Note: Do not use 'assets/assets/'. Use the path relative to the project root.
  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/Valampure-logo.jpeg

  # FONTS SECTION
  fonts:
    - family: Valampure
      fonts:
        - asset: assets/fonts/valampure.ttf